apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-eks-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-eks-demo
  template:
    metadata:
      labels:
        app: spring-eks-demo
    spec:
      containers:
        - name: spring-eks-demo
          image: REPLACE_IMAGE
          ports:
            - containerPort: 8080
